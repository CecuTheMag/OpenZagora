# Open Zagora - Docker Compose Configuration
# This file sets up the complete application stack with one command

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: open-zagora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_zagora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_zagora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-zagora-network

  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: open-zagora-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: open_zagora
      DB_USER: postgres
      DB_PASSWORD: postgres
      CLIENT_URL: http://localhost
    volumes:
      - uploads_data:/app/uploads
      - parsed_data:/app/parsed
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - open-zagora-network

  # Frontend React App
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: open-zagora-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - open-zagora-network

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  parsed_data:
    driver: local

# Network for service communication
networks:
  open-zagora-network:
    driver: bridge
