# Open Zagora - Development Docker Compose
# Use this for development with hot reloading

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: open-zagora-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_zagora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_zagora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-zagora-dev-network

  # Backend API Server (Development with hot reload)
  server:
    image: node:18-alpine
    container_name: open-zagora-server-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: open_zagora
      DB_USER: postgres
      DB_PASSWORD: postgres
      CLIENT_URL: http://localhost:5173
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
      - uploads_data_dev:/app/uploads
      - parsed_data_dev:/app/parsed
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - open-zagora-dev-network

  # Frontend React App (Development with hot reload)
  client:
    image: node:18-alpine
    container_name: open-zagora-client-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5000/api
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - server
    networks:
      - open-zagora-dev-network

# Named volumes for data persistence
volumes:
  postgres_data_dev:
    driver: local
  server_node_modules:
    driver: local
  client_node_modules:
    driver: local
  uploads_data_dev:
    driver: local
  parsed_data_dev:
    driver: local

# Network for service communication
networks:
  open-zagora-dev-network:
    driver: bridge
