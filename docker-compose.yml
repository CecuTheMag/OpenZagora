# Open Zagora - Docker Compose Configuration
# This file sets up the complete application stack with one command

version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: open-zagora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_zagora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_zagora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-zagora-network

  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: open-zagora-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: open_zagora
      DB_USER: postgres
      DB_PASSWORD: postgres
      CLIENT_URL: http://localhost
    volumes:
      - uploads_data:/app/uploads
      - parsed_data:/app/parsed
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - open-zagora-network

  # Frontend React App
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: open-zagora-client
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - open-zagora-network

  # ==========================================
  # ADMIN SYSTEM (COMPLETELY SEPARATE)
  # ==========================================

  # Admin PostgreSQL Database (Separate from main DB)
  admin-db:
    image: postgres:15-alpine
    container_name: open-zagora-admin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: openzagora_admin
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: admin_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data
      - ./admin-server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d openzagora_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-zagora-network

  # Admin Backend API Server
  admin-server:
    build:
      context: ./admin-server
      dockerfile: Dockerfile
    container_name: open-zagora-admin-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      ADMIN_PORT: 5001
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-min-32-chars
      JWT_EXPIRES_IN: 24h
      ADMIN_CLIENT_URL: http://localhost:8080
      # Admin Database Connection
      ADMIN_DB_HOST: admin-db
      ADMIN_DB_PORT: 5432
      ADMIN_DB_NAME: openzagora_admin
      ADMIN_DB_USER: admin_user
      ADMIN_DB_PASSWORD: admin_pass
      # Main Database Connection (for PDF storage)
      MAIN_DB_HOST: db
      MAIN_DB_PORT: 5432
      MAIN_DB_NAME: open_zagora
      MAIN_DB_USER: postgres
      MAIN_DB_PASSWORD: postgres
    volumes:
      - admin_uploads_data:/app/uploads
      - admin_parsed_data:/app/parsed
    ports:
      - "5001:5001"
    depends_on:
      admin-db:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - open-zagora-network

  # Admin Frontend React App
  admin-client:
    build:
      context: ./admin-client
      dockerfile: Dockerfile
    container_name: open-zagora-admin-client
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - admin-server
    networks:
      - open-zagora-network

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  parsed_data:
    driver: local
  # Admin volumes
  admin_postgres_data:
    driver: local
  admin_uploads_data:
    driver: local
  admin_parsed_data:
    driver: local

# Network for service communication
networks:
  open-zagora-network:
    driver: bridge
