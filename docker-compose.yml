# Open Zagora - Main Docker Compose
# Includes HTTPS via Caddy (port 443) + all dev services

version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4-alpine
    container_name: open-zagora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: open_zagora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./server/db/budget_schema.sql:/docker-entrypoint-initdb.d/02-budget-schema.sql:ro
      - ./server/db/data_pipeline_schema.sql:/docker-entrypoint-initdb.d/03-data-pipeline-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d open_zagora"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-zagora-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: open-zagora-server
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: open_zagora
      DB_USER: postgres
      DB_PASSWORD: postgres
      CLIENT_URL: https://openzagora.duckdns.org
    volumes:
      - ./server/server.js:/app/server.js
      - ./server/db:/app/db
      - ./server/routes:/app/routes
      - ./server/services:/app/services
      - ./server/scripts:/app/scripts
      - ./server/uploads:/app/uploads
      - ./server/parsed:/app/parsed
      - ./server/budget-pdfs:/app/budget-pdfs
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - open-zagora-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: open-zagora-client
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server
    networks:
      - open-zagora-network

  admin-db:
    image: postgres:15-alpine
    container_name: open-zagora-admin-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: openzagora_admin
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: admin_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - admin_postgres_data:/var/lib/postgresql/data
      - ./admin-server/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d openzagora_admin"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - open-zagora-network

  admin-server:
    build:
      context: ./admin-server
      dockerfile: Dockerfile.dev
    container_name: open-zagora-admin-server
    restart: unless-stopped
    environment:
      NODE_ENV: development
      ADMIN_PORT: 5001
      JWT_SECRET: dev-jwt-secret-change-in-production-min-32-chars-long
      JWT_EXPIRES_IN: 24h
      ADMIN_CLIENT_URL: http://localhost:5174
      ADMIN_DB_HOST: admin-db
      ADMIN_DB_PORT: 5432
      ADMIN_DB_NAME: openzagora_admin
      ADMIN_DB_USER: admin_user
      ADMIN_DB_PASSWORD: admin_pass
      MAIN_DB_HOST: db
      MAIN_DB_PORT: 5432
      MAIN_DB_NAME: open_zagora
      MAIN_DB_USER: postgres
      MAIN_DB_PASSWORD: postgres
    volumes:
      - ./admin-server/server.js:/app/server.js
      - ./admin-server/db:/app/db
      - ./admin-server/routes:/app/routes
      - ./admin-server/middleware:/app/middleware
      - ./admin-server/parsers:/app/parsers
      - ./admin-server/scripts:/app/scripts
    ports:
      - "5001:5001"
    depends_on:
      admin-db:
        condition: service_healthy
      db:
        condition: service_healthy
    networks:
      - open-zagora-network

  admin-client:
    build:
      context: ./admin-client
      dockerfile: Dockerfile.dev
    container_name: open-zagora-admin-client
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:5001
    volumes:
      - ./admin-client/index.html:/app/index.html
      - ./admin-client/vite.config.js:/app/vite.config.js
      - ./admin-client/package.json:/app/package.json
      - ./admin-client/src:/app/src
    ports:
      - "5174:5174"
    depends_on:
      - admin-server
    networks:
      - open-zagora-network

  caddy:
    image: caddy:alpine
    container_name: open-zagora-caddy
    restart: unless-stopped
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - client
      - admin-server
    networks:
      - open-zagora-network

volumes:
  postgres_data:
    driver: local
  admin_postgres_data:
    driver: local
  caddy_data:
  caddy_config:

networks:
  open-zagora-network:
    driver: bridge
